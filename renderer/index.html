<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOTEMA</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">NOTEMA</div>
        <div class="actions">
          <button id="newBtn" class="button ghost" title="Nueva nota">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <button id="saveBtn" class="button" title="Guardar (Ctrl+S)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
          <button id="openBtn" class="button ghost" title="Abrir (Ctrl+O)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 13h6m-3-3v6m-9 1V7a2 2 0 0 1 2-2h6l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          </button>
          <div class="separator"></div>
          <button id="boldBtn" class="button ghost" title="Negrita (Ctrl+B)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
          </button>
          <button id="italicBtn" class="button ghost" title="Cursiva (Ctrl+I)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
          </button>
          <button id="underlineBtn" class="button ghost" title="Subrayar (Ctrl+U)">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg>
          </button>
          <div class="separator"></div>
          <button id="printBtn" class="button ghost" title="Imprimir / PDF (Ctrl+P)">
             <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
          </button>
          <button id="zenBtn" class="button ghost" title="Zen Mode">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </button>
          <button id="sidePanelBtn" class="button ghost" title="Panel Lateral">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          </button>
          <div class="separator"></div>
          <button id="boardBtn" class="button ghost" title="Mapa / Ideas">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><path d="M10 7h4"/><path d="M6.5 10.5v3"/><path d="M17.5 10.5v3"/><path d="M10 17h4"/></svg>
          </button>
          <button id="addCardBtn" class="button ghost" title="Agregar cuadro">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M12 9v6"/><path d="M9 12h6"/></svg>
          </button>
          <button id="addStickyBtn" class="button ghost" title="Agregar post-it">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10a2 2 0 0 1 2 2v10l-6 6H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M13 21v-4a2 2 0 0 1 2-2h4"/></svg>
          </button>
          <div class="menu">
            <button id="menuBtn" class="button ghost" title="Menú" aria-haspopup="true" aria-expanded="false">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 7h14"/><path d="M5 12h14"/><path d="M5 17h14"/></svg>
            </button>
            <div id="menuDropdown" class="menu-dropdown hidden" aria-hidden="true">
              <button id="menuAddCard" class="menu-item" type="button">Nuevo cuadro</button>
              <button id="menuAddSticky" class="menu-item" type="button">Nuevo post-it</button>
              <div class="menu-sep"></div>
              <button id="menuConnect" class="menu-item" type="button">Conectar (C)</button>
              <button id="menuDuplicate" class="menu-item" type="button">Duplicar (Ctrl+D)</button>
              <button id="menuDelete" class="menu-item danger" type="button">Eliminar seleccionado</button>
              <div class="menu-sep"></div>
              <button id="menuCenter" class="menu-item" type="button">Centrar vista (Ctrl+0)</button>
              <button id="menuGrid" class="menu-item" type="button">Cuadrícula</button>
              <button id="menuRuler" class="menu-item" type="button">Regla</button>
              <button id="menuRulerAngle" class="menu-item" type="button">Ángulos: 45°</button>
              <div class="menu-sep"></div>
              <div class="menu-label">Color cuadrícula</div>
              <div class="menu-color-row" role="group" aria-label="Color cuadrícula">
                <button class="color-btn grid-black" type="button" data-grid-color="black" title="Negro"></button>
                <button class="color-btn grid-blue" type="button" data-grid-color="blue" title="Azul"></button>
                <button class="color-btn grid-green" type="button" data-grid-color="green" title="Verde"></button>
                <button class="color-btn grid-purple" type="button" data-grid-color="purple" title="Morado"></button>
                <button class="color-btn grid-red" type="button" data-grid-color="red" title="Rojo"></button>
              </div>
              <div class="menu-sep"></div>
              <div class="menu-label">Color post-it</div>
              <div class="menu-color-row" role="group" aria-label="Color post-it">
                <button class="color-btn yellow" type="button" data-sticky-color="yellow" title="Amarillo"></button>
                <button class="color-btn pink" type="button" data-sticky-color="pink" title="Rosa"></button>
                <button class="color-btn blue" type="button" data-sticky-color="blue" title="Azul"></button>
                <button class="color-btn green" type="button" data-sticky-color="green" title="Verde"></button>
                <button class="color-btn red" type="button" data-sticky-color="red" title="Rojo"></button>
              </div>
              <button id="menuPerf" class="menu-item" type="button">Modo rendimiento</button>
              <div class="menu-sep"></div>
              <button id="menuClearBoard" class="menu-item danger" type="button">Vaciar tablero</button>
            </div>
          </div>
          <div class="separator"></div>
          <div class="window-controls">
            <button id="winMinBtn" class="window-btn" title="Minimizar" aria-label="Minimizar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 9h8"/></svg>
            </button>
            <button id="winMaxBtn" class="window-btn" title="Maximizar" aria-label="Maximizar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><rect x="2.2" y="2.2" width="7.6" height="7.6" rx="0.8"/></svg>
            </button>
            <button id="winCloseBtn" class="window-btn close" title="Cerrar" aria-label="Cerrar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 3l6 6M9 3L3 9"/></svg>
            </button>
          </div>
        </div>
      </header>
      
      <div class="main-container">
        <div class="content-wrapper">
          <section class="meta">
            <input id="fileName" class="input" placeholder="Sin título" />
            <div class="meta-status">
               <span id="lastSaved" class="meta-text">Sin guardar</span>
               <button id="soundToggle" class="link-button" title="Sonido Teclado">🔊 ON</button>
            </div>
          </section>
          
          <main class="editor">
            <div id="editor" class="editor-area" contenteditable="true" data-placeholder="Escribe algo genial..."></div>
            <div id="boardOverlay" class="board-overlay hidden" aria-hidden="true">
              <svg id="boardEdges" class="board-edges" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
              <div id="boardNodes" class="board-nodes"></div>
            </div>
          </main>
        </div>

        <aside id="sidePanel" class="side-panel hidden">
            <div class="panel-section">
                <h3>Sesión</h3>
                <div class="panel-stat">
                    <span class="label">Tiempo</span>
                    <span class="value" id="sessionTime">00:00</span>
                </div>
                <div class="panel-stat">
                    <span class="label">Palabras</span>
                    <span class="value" id="wordCount">0</span>
                </div>
                <div class="panel-stat">
                    <span class="label">Caracteres</span>
                    <span class="value" id="charCount">0</span>
                </div>
            </div>
            <div class="panel-section">
                <div class="panel-title-row">
                  <h3>Notas</h3>
                  <button id="refreshNotesBtn" class="link-button" title="Actualizar lista">↻</button>
                </div>
                <div id="notesList" class="notes-list"></div>
            </div>
            <div class="panel-section">
                <h3>Sistema</h3>
                <div class="panel-stat">
                    <span class="label">Hora</span>
                    <span class="value" id="clockTime">--:--</span>
                </div>
                 <div class="panel-stat">
                    <span class="label">Estado</span>
                    <span class="value success">En línea</span>
                </div>
            </div>
            <div class="panel-section">
                <h3>Música</h3>
                <div class="music-widget">
                    <div class="music-icon">🎵</div>
                    <div class="music-info">
                        <span class="music-title">Spotify / Chrome</span>
                        <span class="music-status">No detectado</span>
                    </div>
                </div>
            </div>
        </aside>
      </div>

      <footer class="status">
        <span id="statusText">Listo</span>
        <span id="statsText">0 palabras</span>
      </footer>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
